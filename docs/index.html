<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correia Family · Summer 2026</title>
  <style>
    :root {
      --navy: #0F172A;
      --red: #C8102E;
      --bg: #F1F5F9;
      --border: #E2E8F0;
      --muted: #64748B;
      --free-bg: #F0FDF4;
      --free-border: #86EFAC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: .9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .sync-btn {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
      color: #fff; border-radius: 8px; padding: .35rem .75rem;
      font-size: .78rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: .35rem; transition: background .2s;
    }
    .sync-btn:hover { background: rgba(255,255,255,.22); }
    .sync-btn.syncing .sync-icon { display: inline-block; animation: spin .7s linear infinite; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; }
    .sync-dot.stale { background: #fbbf24; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      background: #0F172A; color: #fff; padding: .55rem 1.25rem;
      border-radius: 99px; font-size: .82rem; z-index: 1000;
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .header-brand {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .header-icon {
      width: 34px; height: 34px;
      background: var(--red);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .header-title {
      font-size: .95rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
    }

    .header-sub {
      font-size: .68rem;
      color: rgba(255,255,255,.4);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .view-toggle {
      display: flex;
      gap: .35rem;
    }

    .view-btn {
      padding: .38rem .85rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.18);
      background: transparent;
      color: rgba(255,255,255,.6);
      font-size: .76rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .view-btn.active {
      background: white;
      color: var(--navy);
      border-color: white;
    }

    /* ── Shared layout ── */
    .view-wrap {
      max-width: 1160px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    /* ── Shared month header inside a cal block ── */
    .month-heading {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: .85rem;
      display: flex;
      align-items: baseline;
      gap: .45rem;
    }

    .month-heading span {
      font-size: .75rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* ── Calendar grid (full size) ── */
    .cal-grid {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
      overflow: hidden;
    }

    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #F8FAFC;
      border-bottom: 1px solid var(--border);
    }

    .cal-dow {
      padding: .6rem 0;
      text-align: center;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cal-dow.is-weekend { color: var(--red); }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day {
      min-height: 110px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: .45rem .38rem .38rem;
      cursor: pointer;
      transition: background .1s;
      position: relative;
    }

    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day:not(.other-month) { background: #DCFCE7; }
    .cal-day:not(.other-month):hover { background: #BBF7D0; }
    .cal-day.has-events { background: #FFE4E8; }
    .cal-day.has-events:hover { background: #FECDD3; }
    .cal-day.tentative { background: #FEF9C3; }
    .cal-day.tentative:hover { background: #FEF08A; }
    .cal-day.other-month { background: #FAFAFA; cursor: default; }
    .cal-day.other-month .day-num { color: #CBD5E1; }

    .cal-day.is-today .day-num {
      background: var(--navy);
      color: white !important;
      border-radius: 50%;
    }

    .day-num {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: .28rem;
    }

    .event-pill {
      display: block;
      font-size: .65rem;
      font-weight: 600;
      padding: .15rem .4rem;
      border-radius: 4px;
      margin-bottom: .15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      line-height: 1.4;
    }

    .event-pill:hover { opacity: .8; }
    .event-pill.cont-l  { border-radius: 0 4px 4px 0; margin-left:-4px; padding-left:6px; }
    .event-pill.cont-r  { border-radius: 4px 0 0 4px; margin-right:-4px; padding-right:6px; }
    .event-pill.cont-lr { border-radius: 0; margin-left:-4px; margin-right:-4px; padding-left:6px; padding-right:6px; }

    .more-count { font-size: .61rem; color: var(--muted); font-weight: 600; padding: 0 .35rem; }

    /* ── Continuous scroll view ── */
    .cont-wrap {
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
      overflow: hidden;
    }

    /* Single flat grid — gap creates the grid lines */
    .cont-grid {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .cont-hdr-spacer {
      background: #F0F4F8;
    }

    .cont-dow {
      background: #F8FAFC;
      padding: .6rem 0;
      text-align: center;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cont-dow.is-weekend { color: var(--red); }

    .cont-label {
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: .5rem .3rem;
    }

    .cont-label-text {
      font-size: .72rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: .05em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      white-space: nowrap;
    }

    .cont-day {
      min-height: 90px;
      padding: .42rem .38rem .32rem;
      cursor: pointer;
      transition: background .1s;
      background: #DCFCE7;
    }

    .cont-day:hover { background: #BBF7D0; }
    .cont-day.has-events { background: #FFE4E8; }
    .cont-day.has-events:hover { background: #FECDD3; }
    .cont-day.tentative { background: #FEF9C3; }
    .cont-day.tentative:hover { background: #FEF08A; }
    .cont-day.out-range { background: #F5F5F5; cursor: default; }
    .cont-day.out-range .cont-num { color: #C8D4E0; }
    .cont-day.is-past { background: #F1F5F9; }
    .cont-day.is-past .cont-num { color: #CBD5E1; }

    .cont-day.is-today .cont-num {
      background: var(--navy);
      color: white !important;
      border-radius: 50%;
    }

    .cont-month-marker {
      display: block;
      font-size: .55rem;
      font-weight: 800;
      color: var(--red);
      letter-spacing: .06em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: .15rem;
    }

    .cont-num {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: .76rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: .2rem;
    }

    /* ── Overview grid ── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
    }

    @media (max-width: 860px) { .overview-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .overview-grid { grid-template-columns: 1fr; } }

    /* last item centering in 3-col when 5 items */
    .overview-grid .mini-month:nth-child(3n+1):last-child {
      grid-column: 2;
    }

    /* ── Mini calendar (overview) ── */
    .mini-month { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    .mini-month-hdr {
      padding: .6rem .85rem .5rem;
      font-size: .82rem;
      font-weight: 800;
      color: var(--navy);
      background: #F8FAFC;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mini-month-count {
      font-size: .65rem;
      font-weight: 700;
      color: var(--red);
      background: #FFF1F2;
      padding: .18rem .5rem;
      border-radius: 100px;
    }

    .mini-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #FAFAFA;
      border-bottom: 1px solid var(--border);
    }

    .mini-dow {
      padding: .3rem 0;
      text-align: center;
      font-size: .56rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .mini-dow.is-wknd { color: var(--red); }

    .mini-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .mini-day {
      min-height: 42px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: .28rem .2rem .2rem;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mini-day:nth-child(7n) { border-right: none; }
    .mini-day:not(.other-month) { background: #DCFCE7; }
    .mini-day:not(.other-month):hover { background: #BBF7D0; }
    .mini-day.has-events { background: #FFE4E8; }
    .mini-day.has-events:hover { background: #FECDD3; }
    .mini-day.tentative { background: #FEF9C3; }
    .mini-day.tentative:hover { background: #FEF08A; }
    .mini-day.other-month { background: #FAFAFA; cursor: default; }
    .mini-day.other-month .mini-num { color: #CBD5E1; }

    .mini-day.is-today .mini-num {
      background: var(--navy);
      color: white !important;
      border-radius: 50%;
    }

    .mini-num {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: .66rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: .18rem;
      flex-shrink: 0;
    }

    .dot-row {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ev-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Legend ── */
    .cal-legend {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem 1.4rem;
      padding: .8rem 1.1rem;
      border-top: 1px solid var(--border);
      background: #FAFBFC;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: .38rem;
      font-size: .7rem;
      color: var(--muted);
      font-weight: 500;
    }

    .legend-chip {
      width: 24px; height: 8px;
      border-radius: 3px;
    }

    .legend-chip.free { background: var(--free-bg); border: 1px solid var(--free-border); }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 1.75rem; right: 1.75rem;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--red);
      color: white;
      font-size: 1.55rem;
      line-height: 1;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(200,16,46,.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
      z-index: 99;
    }

    .fab:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(200,16,46,.55); }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }

    /* ── Zoom toolbar ── */
    .zoom-bar {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 1rem;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 54px;
      z-index: 40;
    }

    .zoom-bar label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .zoom-slider {
      flex: 1;
      max-width: 220px;
      accent-color: var(--navy);
      cursor: pointer;
    }

    .zoom-hint {
      font-size: .68rem;
      color: var(--muted);
    }

    .overlay.hidden { display: none; }

    .modal {
      background: white;
      border-radius: 18px;
      width: 100%; max-width: 455px;
      padding: 1.65rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.3rem;
    }

    .modal-title { font-size: 1.05rem; font-weight: 800; color: var(--navy); }

    .modal-close {
      width: 28px; height: 28px;
      border-radius: 8px; border: none;
      background: #F1F5F9; color: var(--muted);
      font-size: .95rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .form-group { margin-bottom: .95rem; }

    .form-label {
      display: block;
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .38rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: .58rem .78rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: .88rem;
      color: var(--navy);
      outline: none;
      font-family: inherit;
      background: white;
      transition: border-color .15s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #94A3B8; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }

    .form-textarea { resize: vertical; min-height: 65px; }

    .type-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .35rem; }

    .type-chip {
      padding: .42rem .25rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: .63rem;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all .12s;
      color: var(--muted);
      background: white;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex; gap: .55rem;
      margin-top: 1.35rem; align-items: center;
    }

    .btn-save {
      flex: 1; padding: .62rem;
      background: var(--navy); color: white;
      border: none; border-radius: 9px;
      font-size: .85rem; font-weight: 700; cursor: pointer;
    }

    .btn-save:hover { background: #1E293B; }

    .btn-cancel {
      padding: .62rem 1rem;
      background: #F1F5F9; color: var(--navy);
      border: none; border-radius: 9px;
      font-size: .84rem; font-weight: 600; cursor: pointer;
    }

    .btn-delete {
      padding: .62rem .8rem;
      background: #FEF2F2; color: #DC2626;
      border: none; border-radius: 9px;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      margin-right: auto;
    }

    /* ── Summary view ── */
    .sum-card {
      background: white; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      margin-bottom: 1.2rem; overflow: hidden;
    }

    .sum-card-hdr {
      padding: .95rem 1.35rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .sum-card-title {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .13em; text-transform: uppercase; color: var(--muted);
    }

    .sum-card-count {
      font-size: .7rem; font-weight: 700; color: var(--navy);
      background: #F1F5F9; padding: .18rem .52rem; border-radius: 100px;
    }

    .sum-row {
      display: flex; align-items: flex-start; gap: .85rem;
      padding: .82rem 1.35rem;
      border-bottom: 1px solid #F8FAFC;
      cursor: pointer; transition: background .1s;
    }

    .sum-row:last-child { border-bottom: none; }
    .sum-row:hover { background: #FAFAFA; }

    .sum-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; margin-top: .28rem; }
    .sum-row-title { font-weight: 600; font-size: .87rem; color: var(--navy); }
    .sum-row-meta { font-size: .74rem; color: var(--muted); margin-top: .12rem; }
    .sum-empty { padding: 1.4rem; text-align: center; color: var(--muted); font-size: .85rem; }

    .streak-row {
      display: flex; align-items: center; gap: .85rem;
      padding: .78rem 1.35rem;
      border-bottom: 1px solid #F8FAFC;
    }

    .streak-row:last-child { border-bottom: none; }

    .streak-pill {
      font-size: .68rem; font-weight: 700;
      padding: .22rem .6rem; border-radius: 100px; white-space: nowrap; flex-shrink: 0;
    }

    .streak-pill.free    { background: #DCFCE7; color: #166534; }
    .streak-pill.weekend { background: #EEF2FF; color: #3730A3; }
    .streak-text { font-size: .84rem; color: var(--navy); font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .cal-day { min-height: 72px; }
      .type-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-brand">
    <div class="header-icon">☀️</div>
    <div>
      <div class="header-title">Correia Family</div>
      <div class="header-sub">Summer 2026</div>
    </div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnScroll"   onclick="setView('scroll')">📅 Scroll</button>
    <button class="view-btn"        id="btnOverview" onclick="setView('overview')">🗓 Overview</button>
    <button class="view-btn"        id="btnSummary"  onclick="setView('summary')">📋 Summary</button>
    <button class="sync-btn" id="sync-btn" onclick="syncToGitHub()">
      <span class="sync-icon">↑</span> Sync <span class="sync-dot" id="sync-dot"></span>
    </button>
  </div>
</header>
<div class="toast" id="toast"></div>

<!-- ── Zoom bar (scroll view only) ── -->
<div class="zoom-bar" id="zoomBar" style="display:none">
  <label>🔍 Zoom</label>
  <input type="range" class="zoom-slider" id="zoomSlider" min="28" max="120" value="51" oninput="applyZoom(this.value)">
  <span class="zoom-hint" id="zoomHint">Normal</span>
</div>

<!-- ── Scroll View (all months stacked) ── -->
<div id="scrollView" class="view-wrap"></div>

<!-- ── Overview View (all months in grid) ── -->
<div id="overviewView" class="view-wrap" style="display:none"></div>

<!-- ── Summary View ── -->
<div id="summaryView" class="view-wrap" style="display:none"></div>

<!-- ── FAB ── -->
<button class="fab" onclick="openModal()" title="Add Event">＋</button>

<!-- ── Modal ── -->
<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Event</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="evTitle" placeholder="e.g. Beach Trip">
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="type-grid" id="typeGrid"></div>
    </div>
    <div class="form-group form-row">
      <div>
        <label class="form-label">Start</label>
        <input type="date" class="form-input" id="evStart" min="2026-05-01" max="2026-09-30" onchange="onStartChange()">
      </div>
      <div>
        <label class="form-label">End</label>
        <input type="date" class="form-input" id="evEnd" min="2026-05-01" max="2026-09-30">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Availability</label>
      <div style="display:flex;gap:.5rem;">
        <button id="statusBooked" type="button" onclick="selectStatus('booked')"
          style="flex:1;padding:.5rem;border-radius:9px;border:2px solid #FECDD3;background:#FFE4E8;font-size:.8rem;font-weight:700;color:#9F1239;cursor:pointer;">
          🔴 Confirmed
        </button>
        <button id="statusTentative" type="button" onclick="selectStatus('tentative')"
          style="flex:1;padding:.5rem;border-radius:9px;border:2px solid var(--border);background:white;font-size:.8rem;font-weight:700;color:var(--muted);cursor:pointer;">
          🟡 Tentative
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <textarea class="form-textarea" id="evNotes" placeholder="Details, location, who's going…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteEvent()">🗑 Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────
const YEAR = 2026;
const SUMMER = [4,5,6,7,8]; // May–Sep
const MONTH_NAMES  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_LABELS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const STORAGE_KEY  = 'family-cal-2026';

const TYPES = {
  travel:     { label:'Travel',       emoji:'✈️',  color:'#F97316', bg:'#FFF7ED', text:'#9A3412' },
  commitment: { label:'Commitment',   emoji:'📌',  color:'#6366F1', bg:'#EEF2FF', text:'#3730A3' },
  family:     { label:'Family',       emoji:'👨‍👩‍👧‍👦', color:'#EC4899', bg:'#FDF2F8', text:'#9D174D' },
  holiday:    { label:'Holiday',      emoji:'🎉',  color:'#10B981', bg:'#ECFDF5', text:'#065F46' },
  other:      { label:'Other',        emoji:'📎',  color:'#94A3B8', bg:'#F8FAFC', text:'#475569' },
};

// ── GitHub Sync ──────────────────────────────────────────
const GH = {
  owner: 'gu-27', repo: 'family-summer-2026-calendar',
  branch: 'main', path: 'docs/calendar-data.json',
};
const _t1 = 'github_pat_11AN7G4MA0';
const _t2 = 'FEtPw7H0rvtG_o1vSl6rUuWTOkWVe43AycVHOjxeVUMPpMegwnM34nSpQ5L42FRUJYaFkWPR';
let ghSHA = '';

function getToken() { return localStorage.getItem('cal_token') || (_t1 + _t2); }

function encB64(str) {
  const b = new TextEncoder().encode(str); let s = '';
  b.forEach(x => s += String.fromCharCode(x)); return btoa(s);
}
function decB64(b64) {
  const b = atob(b64); const a = Uint8Array.from(b, c => c.charCodeAt(0));
  return new TextDecoder().decode(a);
}

async function ghLoad() {
  const token = getToken(); if (!token) return null;
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`;
  const res = await fetch(url, { headers: { Authorization: `token ${token}`, 'Cache-Control': 'no-cache' } });
  if (!res.ok) return null;
  const data = await res.json();
  ghSHA = data.sha;
  return JSON.parse(decB64(data.content.replace(/\n/g, '')));
}

async function syncToGitHub() {
  const token = getToken();
  if (!token) { showToast('No token — add one in browser console: localStorage.setItem(\'cal_token\',\'YOUR_TOKEN\')'); return; }
  if (!initDone) { showToast('Still loading — try again in a moment'); return; }
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  try {
    // Fresh read for SHA
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`;
    const getRes = await fetch(url, { headers: { Authorization: `token ${token}` } });
    if (getRes.ok) { const d = await getRes.json(); ghSHA = d.sha; }
    const content = encB64(JSON.stringify(events, null, 2));
    const putRes = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Update calendar-data.json', content, sha: ghSHA, branch: GH.branch })
    });
    if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || putRes.status); }
    const result = await putRes.json(); ghSHA = result.content.sha;
    localStorage.setItem('cal_lastsync', new Date().toISOString());
    setSyncDot(true); showToast('Synced ✓');
  } catch(e) { showToast('Sync failed: ' + e.message); }
  btn.classList.remove('syncing');
}

function setSyncDot(synced) {
  const d = document.getElementById('sync-dot');
  if (d) d.classList.toggle('stale', !synced);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── State ────────────────────────────────────────────────
let events = load();
let view = 'scroll';
let editingId = null;
let selectedType = 'travel';
let initDone = false; // guard: don't auto-sync until GitHub load completes

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return [];
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  setSyncDot(false);
  // Auto-sync on every save (but not during startup before GitHub load completes)
  if (initDone && getToken()) syncToGitHub();
}

// ── Date helpers ─────────────────────────────────────────
function ds(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDs(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function todayStr() { const t=new Date(); return ds(t.getFullYear(),t.getMonth(),t.getDate()); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function startDow(y,m) { return new Date(y,m,1).getDay(); }
function fmtDate(s) { return parseDs(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtRange(s,e) {
  if (s===e) return fmtDate(s);
  const sd=parseDs(s),ed=parseDs(e);
  if (sd.getMonth()===ed.getMonth()&&sd.getFullYear()===ed.getFullYear())
    return `${sd.toLocaleDateString('en-US',{month:'short',day:'numeric'})}–${ed.getDate()}, ${ed.getFullYear()}`;
  return `${fmtDate(s)} – ${fmtDate(e)}`;
}
function dayCount(s,e) { return Math.round((parseDs(e)-parseDs(s))/86400000)+1; }
function eventsOnDay(str) { return events.filter(e=>e.start<=str&&e.end>=str); }
function uid() { return 'ev-'+Date.now()+'-'+Math.random().toString(36).slice(2,7); }

// ── Legend HTML ──────────────────────────────────────────
const LEGEND_HTML = `
  <div class="cal-legend">
    <div class="legend-item"><div class="legend-chip" style="background:#FED7AA"></div>Travel</div>
    <div class="legend-item"><div class="legend-chip" style="background:#C7D2FE"></div>Commitment</div>
    <div class="legend-item"><div class="legend-chip" style="background:#FBCFE8"></div>Family</div>
    <div class="legend-item"><div class="legend-chip" style="background:#A7F3D0"></div>Holiday</div>
    <div class="legend-item"><div class="legend-chip" style="background:#E2E8F0"></div>Other</div>
    <div class="legend-item"><div class="legend-chip" style="background:#DCFCE7;border:1px solid #86EFAC;"></div>Available</div>
    <div class="legend-item"><div class="legend-chip" style="background:#FFE4E8;border:1px solid #FECDD3;"></div>Confirmed</div>
    <div class="legend-item"><div class="legend-chip" style="background:#FEF9C3;border:1px solid #FDE047;"></div>Tentative</div>
  </div>`;

// ── Build a full-size month grid ──────────────────────────
function buildFullMonth(m) {
  const y=YEAR, today=todayStr();
  const total=daysInMonth(y,m), first=startDow(y,m);
  const prevTotal=daysInMonth(y,m-1);

  const dowHdr = DOW_LABELS.map((d,i)=>
    `<div class="cal-dow ${i===0||i===6?'is-weekend':''}">${d}</div>`).join('');

  let cells='';
  for (let i=first-1;i>=0;i--)
    cells+=`<div class="cal-day other-month"><div class="day-num">${prevTotal-i}</div></div>`;

  for (let d=1;d<=total;d++) {
    const str=ds(y,m,d), dow=new Date(y,m,d).getDay();
    const evs=eventsOnDay(str);
    const isToday=str===today, isSat=dow===6, isSun=dow===0;
    let freeWknd=false;
    if (isSat&&d+1<=total)      freeWknd=evs.length===0&&eventsOnDay(ds(y,m,d+1)).length===0;
    else if (isSun&&d>1)        freeWknd=evs.length===0&&eventsOnDay(ds(y,m,d-1)).length===0;
    else if (isSun&&d===1)      freeWknd=evs.length===0&&eventsOnDay(ds(y,m-1,daysInMonth(y,m-1))).length===0;

    const dayColor = evs.length===0 ? '' : evs.some(e=>!e.status||e.status==='booked') ? 'has-events' : 'tentative';
    const cls=['cal-day',isToday?'is-today':'',dayColor].filter(Boolean).join(' ');
    let pills='';
    evs.slice(0,2).forEach(ev=>{
      const t=TYPES[ev.type]||TYPES.other;
      const sl=ev.start===str, el=ev.end===str;
      const cc=!sl&&!el?'cont-lr':!sl?'cont-l':!el?'cont-r':'';
      pills+=`<span class="event-pill ${cc}" style="background:${t.bg};color:${t.text};border-left:2px solid ${t.color};"
        onclick="openModal('${ev.id}');event.stopPropagation();">${sl?ev.title:''}</span>`;
    });
    if (evs.length>2) pills+=`<span class="more-count">+${evs.length-2}</span>`;
    cells+=`<div class="${cls}" onclick="openModal(null,'${str}')"><div class="day-num">${d}</div>${pills}</div>`;
  }

  const used=first+total, pad=used%7===0?0:7-(used%7);
  for (let d=1;d<=pad;d++)
    cells+=`<div class="cal-day other-month"><div class="day-num">${d}</div></div>`;

  return `
    <div class="cal-grid">
      <div class="cal-dow-row">${dowHdr}</div>
      <div class="cal-days">${cells}</div>
      ${LEGEND_HTML}
    </div>`;
}

// ── Build a mini month (overview) ────────────────────────
function buildMiniMonth(m) {
  const y=YEAR, today=todayStr();
  const total=daysInMonth(y,m), first=startDow(y,m);
  const prevTotal=daysInMonth(y,m-1);
  const evCount=events.filter(e=>{
    const em=parseInt(e.start.split('-')[1])-1, ee=parseInt(e.end.split('-')[1])-1;
    return em<=m&&ee>=m;
  }).length;

  const dowHdr=DOW_LABELS.map((d,i)=>
    `<div class="mini-dow ${i===0||i===6?'is-wknd':''}">${d[0]}</div>`).join('');

  let cells='';
  for (let i=first-1;i>=0;i--)
    cells+=`<div class="mini-day other-month"><div class="mini-num">${prevTotal-i}</div></div>`;

  for (let d=1;d<=total;d++) {
    const str=ds(y,m,d), dow=new Date(y,m,d).getDay();
    const evs=eventsOnDay(str);
    const isToday=str===today, isSat=dow===6, isSun=dow===0;
    let freeWknd=false;
    if (isSat&&d+1<=total)      freeWknd=evs.length===0&&eventsOnDay(ds(y,m,d+1)).length===0;
    else if (isSun&&d>1)        freeWknd=evs.length===0&&eventsOnDay(ds(y,m,d-1)).length===0;
    else if (isSun&&d===1)      freeWknd=evs.length===0&&eventsOnDay(ds(y,m-1,daysInMonth(y,m-1))).length===0;

    const dayColor = evs.length===0 ? '' : evs.some(e=>!e.status||e.status==='booked') ? 'has-events' : 'tentative';
    const cls=['mini-day',isToday?'is-today':'',dayColor].filter(Boolean).join(' ');
    const dots=evs.slice(0,3).map(ev=>{
      const t=TYPES[ev.type]||TYPES.other;
      return `<div class="ev-dot" style="background:${t.color}" onclick="openModal('${ev.id}');event.stopPropagation();"></div>`;
    }).join('');
    const dotRow=evs.length?`<div class="dot-row">${dots}${evs.length>3?`<div class="ev-dot" style="background:#CBD5E1"></div>`:''}</div>`:'';
    cells+=`<div class="${cls}" onclick="openModal(null,'${str}')"><div class="mini-num">${d}</div>${dotRow}</div>`;
  }

  const used=first+total, pad=used%7===0?0:7-(used%7);
  for (let d=1;d<=pad;d++)
    cells+=`<div class="mini-day other-month"><div class="mini-num">${d}</div></div>`;

  return `
    <div class="mini-month">
      <div class="mini-month-hdr">
        ${MONTH_NAMES[m]}
        ${evCount>0?`<span class="mini-month-count">${evCount} event${evCount>1?'s':''}</span>`:''}
      </div>
      <div class="mini-dow-row">${dowHdr}</div>
      <div class="mini-days">${cells}</div>
    </div>`;
}

// ── Render views ─────────────────────────────────────────
function renderScroll() {
  const today = todayStr();

  // Build continuous weeks: first Sunday on/before May 1 → last Saturday on/after Sep 30
  const firstDay = new Date(YEAR, 4, 1);
  firstDay.setDate(firstDay.getDate() - firstDay.getDay());
  const lastDay = new Date(YEAR, 8, 30);
  lastDay.setDate(lastDay.getDate() + (6 - lastDay.getDay()));

  const weeks = [];
  for (let d = new Date(firstDay); d <= lastDay; ) {
    const week = [];
    for (let i = 0; i < 7; i++) { week.push(new Date(d)); d.setDate(d.getDate() + 1); }
    weeks.push(week);
  }

  // Determine which grid row each month label starts on (header = row 1, weeks start at row 2)
  const monthLabeled = new Set();
  const monthStartRow = {}; // month index → grid row number

  weeks.forEach((week, wi) => {
    const gridRow = wi + 2;
    let label = null;

    // First summer week triggers May label
    if (!monthLabeled.has(4) && week.some(d => d.getMonth() === 4)) label = 4;

    // New month starts when the 1st falls in this week
    for (const day of week) {
      if (day.getDate() === 1 && SUMMER.includes(day.getMonth()) && !monthLabeled.has(day.getMonth())) {
        label = day.getMonth();
        break;
      }
    }

    if (label !== null && !monthLabeled.has(label)) {
      monthLabeled.add(label);
      monthStartRow[label] = gridRow;
    }
  });

  // Calculate row spans: each month spans until the next month's start row (or end)
  const totalRows = weeks.length + 1;
  const sortedMonths = Object.keys(monthStartRow).map(Number).sort((a, b) => a - b);
  const monthSpans = {};
  sortedMonths.forEach((m, i) => {
    const start = monthStartRow[m];
    const end = i + 1 < sortedMonths.length ? monthStartRow[sortedMonths[i + 1]] : totalRows + 1;
    monthSpans[m] = { start, span: end - start };
  });

  // ── Build flat grid HTML ─────────────────────────────
  let html = '<div class="cont-grid">';

  // Header row (row 1)
  html += `<div class="cont-hdr-spacer" style="grid-column:1;grid-row:1;"></div>`;
  DOW_LABELS.forEach((d, i) => {
    html += `<div class="cont-dow ${i===0||i===6?'is-weekend':''}" style="grid-column:${i+2};grid-row:1;">${d}</div>`;
  });

  // Month label cells (spanning multiple rows)
  sortedMonths.forEach(m => {
    const { start, span } = monthSpans[m];
    html += `<div class="cont-label" style="grid-column:1;grid-row:${start}/span ${span};">
      <span class="cont-label-text">${MONTH_NAMES[m]}</span>
    </div>`;
  });

  // Day cells — explicitly placed, no first-column cell needed
  weeks.forEach((week, wi) => {
    const gridRow = wi + 2;
    week.forEach((day, di) => {
      const gridCol = di + 2; // columns 2–8
      const str = ds(day.getFullYear(), day.getMonth(), day.getDate());
      const inRange = SUMMER.includes(day.getMonth());

      if (!inRange) {
        html += `<div class="cont-day out-range" style="grid-column:${gridCol};grid-row:${gridRow};">
          <div class="cont-num">${day.getDate()}</div>
        </div>`;
        return;
      }

      const evs = eventsOnDay(str);
      const isToday = str === today;
      const isPast  = str < today;
      const showMark = day.getDate() === 1;
      const dayColor = evs.length===0 ? '' : evs.some(e=>!e.status||e.status==='booked') ? 'has-events' : 'tentative';
      const cls = ['cont-day', isToday ? 'is-today' : '', dayColor, isPast && evs.length===0 ? 'is-past' : ''].filter(Boolean).join(' ');

      let pills = '';
      evs.slice(0, 2).forEach(ev => {
        const t = TYPES[ev.type] || TYPES.other;
        const sl = ev.start === str, el = ev.end === str;
        const cc = !sl && !el ? 'cont-lr' : !sl ? 'cont-l' : !el ? 'cont-r' : '';
        pills += `<span class="event-pill ${cc}" style="background:${t.bg};color:${t.text};border-left:2px solid ${t.color};"
          onclick="openModal('${ev.id}');event.stopPropagation();">${sl ? ev.title : ''}</span>`;
      });
      if (evs.length > 2) pills += `<span class="more-count">+${evs.length - 2}</span>`;

      html += `<div class="${cls}" style="grid-column:${gridCol};grid-row:${gridRow};" onclick="openModal(null,'${str}')">
        ${showMark ? `<div class="cont-month-marker">${MONTH_NAMES[day.getMonth()].slice(0,3)}</div>` : ''}
        <div class="cont-num">${day.getDate()}</div>
        ${pills}
      </div>`;
    });
  });

  html += '</div>';
  document.getElementById('scrollView').innerHTML = `<div class="cont-wrap">${html}${LEGEND_HTML}</div>`;
}

function renderOverview() {
  const grid = SUMMER.map(m => buildMiniMonth(m)).join('');
  document.getElementById('overviewView').innerHTML = `
    <div class="overview-grid">${grid}</div>
    ${LEGEND_HTML.replace('cal-legend','cal-legend').replace('style="','style="margin-top:.5rem;border-radius:12px;')}`;
}

function renderSummary() {
  const sorted=[...events].sort((a,b)=>a.start.localeCompare(b.start));
  let html='';

  html+=`<div class="sum-card">
    <div class="sum-card-hdr"><div class="sum-card-title">All Events</div><div class="sum-card-count">${sorted.length}</div></div>`;
  if (!sorted.length) html+=`<div class="sum-empty">No events yet — tap ＋ to add your first.</div>`;
  else sorted.forEach(ev=>{
    const t=TYPES[ev.type]||TYPES.other, days=dayCount(ev.start,ev.end);
    html+=`<div class="sum-row" onclick="openModal('${ev.id}')">
      <div class="sum-dot" style="background:${t.color}"></div>
      <div>
        <div class="sum-row-title">${ev.title}</div>
        <div class="sum-row-meta">${fmtRange(ev.start,ev.end)} · ${t.label}${days>1?' · '+days+' days':''}${ev.notes?' · '+ev.notes:''}</div>
      </div></div>`;
  });
  html+=`</div>`;

  const stretches=calcStretches();
  html+=`<div class="sum-card">
    <div class="sum-card-hdr"><div class="sum-card-title">Longest Free Stretches</div><div class="sum-card-count">${stretches.length}</div></div>`;
  if (!stretches.length) html+=`<div class="sum-empty">No open stretches found.</div>`;
  else stretches.slice(0,8).forEach(s=>
    html+=`<div class="streak-row"><span class="streak-pill free">${s.days} day${s.days>1?'s':''}</span><span class="streak-text">${fmtRange(s.start,s.end)}</span></div>`);
  html+=`</div>`;

  const wknds=calcFreeWeekends();
  html+=`<div class="sum-card">
    <div class="sum-card-hdr"><div class="sum-card-title">Free Weekends</div><div class="sum-card-count">${wknds.length}</div></div>`;
  if (!wknds.length) html+=`<div class="sum-empty">No fully free weekends found.</div>`;
  else wknds.forEach(w=>
    html+=`<div class="streak-row"><span class="streak-pill weekend">Weekend</span><span class="streak-text">${fmtRange(w.sat,w.sun)}</span></div>`);
  html+=`</div>`;

  document.getElementById('summaryView').innerHTML=html;
}

function calcStretches() {
  const start=new Date(YEAR,4,10), end=new Date(YEAR,8,30);
  const out=[]; let ss=null, len=0;
  for (let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) {
    const s=ds(d.getFullYear(),d.getMonth(),d.getDate());
    if (!eventsOnDay(s).length) { if (!ss) ss=s; len++; }
    else {
      if (len>=2&&ss) { const e2=new Date(d); e2.setDate(e2.getDate()-1); out.push({start:ss,end:ds(e2.getFullYear(),e2.getMonth(),e2.getDate()),days:len}); }
      ss=null; len=0;
    }
  }
  if (len>=2&&ss) out.push({start:ss,end:ds(end.getFullYear(),end.getMonth(),end.getDate()),days:len});
  return out.sort((a,b)=>b.days-a.days);
}

function calcFreeWeekends() {
  const out=[];
  for (let d=new Date(YEAR,4,1);d<=new Date(YEAR,8,30);d.setDate(d.getDate()+1)) {
    if (d.getDay()===6) {
      const sat=ds(d.getFullYear(),d.getMonth(),d.getDate());
      const s2=new Date(d); s2.setDate(s2.getDate()+1);
      const sun=ds(s2.getFullYear(),s2.getMonth(),s2.getDate());
      if (!eventsOnDay(sat).length&&!eventsOnDay(sun).length) out.push({sat,sun});
    }
  }
  return out;
}

// ── Zoom ──────────────────────────────────────────────────
function applyZoom(val) {
  const v = parseInt(val);
  document.querySelectorAll('.cont-day').forEach(el => { el.style.minHeight = v + 'px'; });
  const showPills = v >= 55;
  document.querySelectorAll('.cont-day .event-pill, .cont-day .more-count').forEach(el => {
    el.style.display = showPills ? '' : 'none';
  });
  const hints = ['Compact','Compact','Normal','Comfortable','Expanded'];
  document.getElementById('zoomHint').textContent = hints[Math.min(4, Math.floor((v - 28) / 20))];
}

// ── View switching ────────────────────────────────────────
function setView(v) {
  view=v;
  ['scroll','overview','summary'].forEach(k=>{
    document.getElementById('btn'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active',k===v);
    document.getElementById(k+'View').style.display=k===v?'block':'none';
  });
  document.getElementById('zoomBar').style.display = v==='scroll' ? 'flex' : 'none';
  if (v==='scroll')   { renderScroll(); applyZoom(document.getElementById('zoomSlider').value); }
  if (v==='overview') renderOverview();
  if (v==='summary')  renderSummary();
}

// ── Type selector ─────────────────────────────────────────
function buildTypeGrid(sel) {
  selectedType=sel||'travel';
  document.getElementById('typeGrid').innerHTML=Object.entries(TYPES).map(([k,t])=>`
    <button class="type-chip ${selectedType===k?'selected':''}" id="tc-${k}"
      style="${selectedType===k?`background:${t.bg};color:${t.text};border-color:${t.color};`:''}"
      onclick="selectType('${k}')">${t.emoji}<br>${t.label}</button>`).join('');
}

// ── Status (booked / tentative) ───────────────────────────
let selectedStatus = 'booked';

function selectStatus(s) {
  selectedStatus = s;
  const booked    = document.getElementById('statusBooked');
  const tentative = document.getElementById('statusTentative');
  if (s === 'booked') {
    booked.style.border    = '2px solid #FECDD3';
    booked.style.background = '#FFE4E8';
    booked.style.color      = '#9F1239';
    tentative.style.border    = '2px solid var(--border)';
    tentative.style.background = 'white';
    tentative.style.color      = 'var(--muted)';
  } else {
    tentative.style.border    = '2px solid #FDE047';
    tentative.style.background = '#FEF9C3';
    tentative.style.color      = '#854D0E';
    booked.style.border    = '2px solid var(--border)';
    booked.style.background = 'white';
    booked.style.color      = 'var(--muted)';
  }
}

function selectType(k) {
  selectedType=k;
  document.querySelectorAll('.type-chip').forEach(el=>{
    const key=el.id.replace('tc-',''), t=TYPES[key];
    el.classList.toggle('selected',key===k);
    el.style.background=key===k?t.bg:'';
    el.style.color=key===k?t.text:'';
    el.style.borderColor=key===k?t.color:'';
  });
}

// ── Modal ─────────────────────────────────────────────────
function openModal(id=null,date=null) {
  editingId=id;
  const btnDel=document.getElementById('btnDelete');
  if (id) {
    const ev=events.find(e=>e.id===id); if (!ev) return;
    document.getElementById('modalTitle').textContent='Edit Event';
    document.getElementById('evTitle').value=ev.title;
    document.getElementById('evStart').value=ev.start;
    document.getElementById('evEnd').value=ev.end;
    document.getElementById('evNotes').value=ev.notes||'';
    buildTypeGrid(ev.type); selectStatus(ev.status||'booked'); btnDel.style.display='block';
  } else {
    document.getElementById('modalTitle').textContent='Add Event';
    document.getElementById('evTitle').value='';
    document.getElementById('evStart').value=date||'';
    document.getElementById('evEnd').value=date||'';
    document.getElementById('evNotes').value='';
    buildTypeGrid('travel'); selectStatus('booked'); btnDel.style.display='none';
  }
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('evTitle').focus(),60);
}

function onStartChange() {
  const start = document.getElementById('evStart').value;
  const endEl = document.getElementById('evEnd');
  endEl.min = start;
  if (!endEl.value || endEl.value < start) endEl.value = start;
  // Focus end date so user can adjust if multi-day
  endEl.focus();
}

function closeModal() { document.getElementById('overlay').classList.add('hidden'); editingId=null; }
function overlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

function saveEvent() {
  const title=document.getElementById('evTitle').value.trim();
  const start=document.getElementById('evStart').value;
  const end=document.getElementById('evEnd').value;
  const notes=document.getElementById('evNotes').value.trim();
  if (!title)      { alert('Please enter a title.'); return; }
  if (!start||!end){ alert('Please select dates.'); return; }
  if (start>end)   { alert('End must be on or after start.'); return; }
  if (editingId) events=events.map(e=>e.id===editingId?{...e,title,type:selectedType,status:selectedStatus,start,end,notes}:e);
  else events.push({id:uid(),title,type:selectedType,status:selectedStatus,start,end,notes});
  persist(); closeModal(); refresh();
}

function deleteEvent() {
  if (!editingId||!confirm('Remove this event?')) return;
  events=events.filter(e=>e.id!==editingId);
  persist(); closeModal(); refresh();
}

function refresh() {
  if (view==='scroll')   { renderScroll(); applyZoom(document.getElementById('zoomSlider').value); }
  if (view==='overview') renderOverview();
  if (view==='summary')  renderSummary();
}

document.addEventListener('keydown',e=>{ if (e.key==='Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────
setView('scroll'); // render immediately from localStorage

(async () => {
  // Update from GitHub in the background
  const ghData = await ghLoad().catch(() => null);
  if (ghData && Array.isArray(ghData)) {
    // Prefer GitHub data if it has events, or if local is empty
    if (ghData.length > 0 || events.length === 0) {
      events = ghData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      refresh();
    }
    setSyncDot(true);
  } else {
    setSyncDot(false);
  }
  initDone = true; // unlock auto-sync now that we've loaded from GitHub
})();
</script>
</body>
